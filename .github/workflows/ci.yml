# CI — kiểm tra type, test, build trên mỗi push/PR.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: shop
          POSTGRES_PASSWORD: shop_password
          POSTGRES_DB: shop_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shop -d shop_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://shop:shop_password@localhost:5432/shop_db?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-key-min-32-chars-long
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm install

      - run: npx prisma generate
      - run: npx prisma db push
      - run: npm run db:seed

      - run: npm run typecheck
      - run: npm test
      - run: npm run build
